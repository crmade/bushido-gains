const todayStr = () => {

  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
};
const fmtDate = (iso) => {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return d + "/" + m + "/" + y.slice(2);
};

function ytId(url) {
  if (!url) return null;
  const s = String(url).trim();
  if (/^[\w-]{11}$/.test(s)) return s;
  const m = s.match(/(?:youtu\.be\/|v=|shorts\/|embed\/|live\/)([\w-]{11})/);
  return m ? m[1] : null;
}

function normalizeData(d) {
  const n = d && typeof d === "object" ? d : {};
  if (!n.routine || !n.routine.days) n.routine = defaultRoutine();
  if (!n.routine.warmup) n.routine.warmup = defaultWarmup();
  if (!n.metrics) n.metrics = [];
  if (!n.done) n.done = {};
  if (!n.profile) n.profile = {};
  return n;
}

async function cloudLoad(uid) {
  if (!sb) return null;
  const { data, error } = await sb.from("user_data").select("data").eq("user_id", uid).maybeSingle();
  if (error) throw error;
  return data ? data.data : null;
}

async function cloudSave(uid, payload) {
  if (!sb) return false;
  const { error } = await sb.from("user_data").upsert({ user_id: uid, data: payload, updated_at: new Date().toISOString() });
  return !error;
}

// ---------- Almacenamiento persistente ----------
const hasStorage = (() => {
  try {
    const k = "__hyt_test__";
    localStorage.setItem(k, "1");
    localStorage.removeItem(k);
    return true;
  } catch (e) { return false; }
})();
const store = {
  async get(key) {
    if (!hasStorage) return null;
    try {
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : null;
    } catch (e) { return null; }
  },
  async set(key, val) {
    if (!hasStorage) return false;
    try {
      localStorage.setItem(key, JSON.stringify(val));
      return true;
    } catch (e) { return false; }
  },
  async del(key) {
    if (!hasStorage) return;
    try { localStorage.removeItem(key); } catch (e) {}
  },
};

function VideoEmbed({ video, dayColor }) {
  const [open, setOpen] = useState(false);
  const id = ytId(video);
  if (!id) {
    return <p className="text-sm mt-2" style={{ color: C.dim }}>Sin video. Activa el modo edición y pega un link de YouTube.</p>;
  }
  if (!open) {
    return (
      <button onClick={() => setOpen(true)} className="mt-3 w-full rounded-lg py-2 text-sm font-semibold flex items-center justify-center gap-2 transition-opacity hover:opacity-85" style={{ background: C.surface2, border: "1px solid " + C.line, color: dayColor }}>
        <span style={{ fontSize: 11 }}>▶</span> Ver técnica

    );
  }
  return (
    <div className="mt-3">
      <div className="w-full rounded-lg overflow-hidden" style={{ aspectRatio: "16/9", background: C.ink }}>
        <iframe
          width="100%" height="100%"
          src={"https://www.youtube.com/embed/" + id + "?rel=0"}
          title="Video de técnica"
          frameBorder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"

      <button onClick={() => setOpen(false)} className="mt-1 text-xs" style={{ color: C.dim, background: "none", border: "none", cursor: "pointer" }}>Ocultar video</button>
    </div>
  );
}

// ---------- App principal ----------
function App() {
  const [phase, setPhase] = useState("loading"); // loading | onboard | ready
  const [users, setUsers] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [data, setData] = useState(null); // { metrics, routine, done }
  const [tab, setTab] = useState("rutina");
  const [dayIdx, setDayIdx] = useState(0);
  const [editMode, setEditMode] = useState(false);
  const [saveWarn, setSaveWarn] = useState(false);
  const [session, setSession] = useState(null);
  const [cloudErr, setCloudErr] = useState(false);
  const lastUid = useRef(null);

  useEffect(() => { init(); }, []);

  async function init() {
    if (!hasStorage) setSaveWarn(true);
    if (sb) {
      sb.auth.onAuthStateChange((event, sess) => {
        if (sess && lastUid.current !== sess.user.id) onLogin(sess);
        if (event === "SIGNED_OUT") window.location.reload();
      });
      const { data: s } = await sb.auth.getSession();
      if (s && s.session) { await onLogin(s.session); return; }
    }
    const reg = await store.get("gymapp:users");
    if (!reg || !reg.list || reg.list.length === 0) {
      setPhase("onboard");
      return;
    }
    setUsers(reg.list);
    const id = reg.activeId && reg.list.some((u) => u.id === reg.activeId) ? reg.activeId : reg.list[0].id;
    await loadUser(id, reg.list);
  }

  async function onLogin(sess) {
    if (lastUid.current === sess.user.id) { setSession(sess); return; }
    lastUid.current = sess.user.id;
    setSession(sess);
    setPhase("loading");
    const reg = await store.get("gymapp:users");
    setUsers(reg && reg.list ? reg.list : []);
    let d = null;
    try {
      d = await cloudLoad(sess.user.id);
    } catch (e) {
      setCloudErr(true);
    }
    if (!d) d = (await store.get("gymapp:cloudcache:" + sess.user.id)) || { metrics: [], routine: defaultRoutine(), done: {}, profile: {} };
    d = normalizeData(d);
    setActiveId("cloud:" + sess.user.id);
    setData(d);
    setPhase("ready");
    store.set("gymapp:cloudcache:" + sess.user.id, d);
    cloudSave(sess.user.id, d).then((ok) => setCloudErr(!ok));
  }

  async function signInGoogle() {
    if (!sb) return;
    await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo: window.location.origin + window.location.pathname } });
  }

  async function signOutGoogle() {
    if (!sb) return;
    lastUid.current = null;
    await sb.auth.signOut();
  }

  async function importLocalToCloud(localId) {
    const d = await store.get("gymapp:data:" + localId);
    if (d) await persistData(normalizeData(d));
  }

  async function loadUser(id, list) {
    let d = await store.get("gymapp:data:" + id);
    if (!d) d = { metrics: [], routine: defaultRoutine(), done: {} };
    if (!d.routine || !d.routine.days) d.routine = defaultRoutine();
    if (!d.routine.warmup) { d.routine.warmup = defaultWarmup(); await store.set("gymapp:data:" + id, d); }
    if (!d.metrics) d.metrics = [];
    if (!d.done) d.done = {};
    setActiveId(id);
    setData(d);
    setPhase("ready");
    await store.set("gymapp:users", { list: list || users, activeId: id });
  }

  async function persistData(next) {
    setData(next);
    if (session && sb) {
      store.set("gymapp:cloudcache:" + session.user.id, next);
      const ok = await cloudSave(session.user.id, next);
      setCloudErr(!ok);
      return;
    }
    const ok = await store.set("gymapp:data:" + activeId, next);
    if (!ok && hasStorage) setSaveWarn(true);
  }

  async function createUser(name, height, weight) {
    const user = { id: uid(), name: name.trim(), height: height ? Number(height) : null, createdAt: todayStr() };
    const list = [...users, user];
    setUsers(list);
    const d = { metrics: [], routine: defaultRoutine(), done: {} };
    if (weight) {
      d.metrics.push({ id: uid(), date: todayStr(), weight: Number(weight), fat: null, muscle: null });
    }
    await store.set("gymapp:data:" + user.id, d);
    setActiveId(user.id);
    setData(d);
    setPhase("ready");
    setTab("rutina");
    await store.set("gymapp:users", { list, activeId: user.id });
  }

  async function updateUser(patch) {
    if (session) {
      await persistData({ ...data, profile: { ...(data.profile || {}), ...patch } });
      return;
    }
    const list = users.map((u) => (u.id === activeId ? { ...u, ...patch } : u));
    setUsers(list);
    await store.set("gymapp:users", { list, activeId });
  }

  async function deleteUser(id) {
    const list = users.filter((u) => u.id !== id);
    setUsers(list);
    await store.del("gymapp:data:" + id);
    if (list.length === 0) {
      await store.del("gymapp:users");
      setActiveId(null);
      setData(null);
      setPhase("onboard");
    } else if (id === activeId) {
      await loadUser(list[0].id, list);
    } else {
      await store.set("gymapp:users", { list, activeId });
    }
  }

  const meta = session && session.user.user_metadata ? session.user.user_metadata : {};
  const activeUser = session
    ? { id: "cloud", name: meta.full_name || meta.name || session.user.email || "Mi cuenta", height: data && data.profile ? data.profile.height : null, createdAt: (session.user.created_at || "").slice(0, 10), email: session.user.email || "", avatar: meta.avatar_url || meta.picture || null }
    : (users.find((u) => u.id === activeId) || null);

  // ---- Mutaciones de rutina ----
  function patchExercise(dayId, exId, patch) {
    const next = { ...data, routine: { days: data.routine.days.map((d) => d.id !== dayId ? d : { ...d, exercises: d.exercises.map((e) => (e.id === exId ? { ...e, ...patch } : e)) }) } };
    persistData(next);
  }
  function addExercise(dayId) {
    const ne = ex("Nuevo ejercicio", 3, "10", "", "", "");
    const next = { ...data, routine: { days: data.routine.days.map((d) => (d.id !== dayId ? d : { ...d, exercises: [...d.exercises, ne] })) } };
    persistData(next);
  }
  function removeExercise(dayId, exId) {
    const next = { ...data, routine: { days: data.routine.days.map((d) => (d.id !== dayId ? d : { ...d, exercises: d.exercises.filter((e) => e.id !== exId) })) } };
    persistData(next);
  }
  function moveExercise(dayId, exId, dir) {
    const next = {
      ...data,
      routine: {
        days: data.routine.days.map((d) => {
          if (d.id !== dayId) return d;
          const arr = [...d.exercises];
          const i = arr.findIndex((e) => e.id === exId);
          const j = i + dir;
          if (i < 0 || j < 0 || j >= arr.length) return d;
          const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
          return { ...d, exercises: arr };
        }),
      },
    };
    persistData(next);
  }
  function resetRoutine() {
    persistData({ ...data, routine: defaultRoutine() });
    setEditMode(false);
  }
  function applyGeneratedDays(days) {
    persistData({ ...data, routine: { warmup: (data.routine && data.routine.warmup) || defaultWarmup(), days } });
    setDayIdx(0);
    setEditMode(false);
    setTab("rutina");
  }
  function toggleDone(exId) {
    const t = todayStr();
    const day = { ...(data.done[t] || {}) };
    if (day[exId]) delete day[exId]; else day[exId] = true;
    persistData({ ...data, done: { ...data.done, [t]: day } });
  }

  // ---- Medidas ----
  function addMetric(m) {
    const metrics = [...data.metrics, { id: uid(), ...m }].sort((a, b) => (a.date < b.date ? -1 : 1));
    persistData({ ...data, metrics });
  }
  function deleteMetric(id) {
    persistData({ ...data, metrics: data.metrics.filter((m) => m.id !== id) });
  }

  // ---------- Render ----------
  if (phase === "loading") {
    return (
      <Shell>
        <div className="flex items-center justify-center" style={{ minHeight: "60vh" }}>
          <p style={{ color: C.dim }}>Cargando tu plan…</p>
        </div>
      </Shell>
    );

  if (phase === "onboard") {
    return (
      <Shell>
        <Onboard onCreate={createUser} saveWarn={saveWarn} sbReady={!!sb} onSignIn={signInGoogle} />

  return (
    <Shell>

          {activeUser && (

          )}
        </div>

      {saveWarn && (

        </div>
      )}

      {cloudErr && session && (

        </div>
      )}

      <main className="px-4 pb-28 pt-4">
        {tab === "rutina" && data && (
          <RoutineTab
            data={data}
            dayIdx={dayIdx}

            setEditMode={setEditMode}
            patchExercise={patchExercise}

const METRIC_DEFS = {
  weight: { label: "Peso", unit: "kg", color: C.gold },
  fat: { label: "% Grasa", unit: "%", color: C.red },
  muscle: { label: "% Músculo", unit: "%", color: C.green },
  bmi: { label: "IMC", unit: "", color: C.blue },
};

function bmiOf(weight, heightCm) {
  if (!weight || !heightCm) return null;
  const h = heightCm / 100;
  return Math.round((weight / (h * h)) * 10) / 10;
}
function bmiLabel(b) {
  if (b == null) return "";
  if (b < 18.5) return "Bajo peso";
  if (b < 25) return "Normal";
  if (b < 30) return "Sobrepeso";
  return "Obesidad";
}


// Grafica SVG ligera, sin dependencias
function MiniChart({ data, color, unit }) {
  const W = 340, H = 210, P = { t: 14, r: 14, b: 26, l: 40 };
  const vals = data.map((d) => d.v);
  let min = Math.min(...vals);
  let max = Math.max(...vals);
  if (min === max) { min -= 1; max += 1; }
  const pad = (max - min) * 0.12;
  min -= pad; max += pad;
  const x = (i) => P.l + (i * (W - P.l - P.r)) / Math.max(1, data.length - 1);
  const y = (v) => P.t + (1 - (v - min) / (max - min)) * (H - P.t - P.b);
  const pts = data.map((d, i) => x(i) + "," + y(d.v)).join(" ");
  const ticks = [min, (min + max) / 2, max];
  const r1 = (v) => Math.round(v * 10) / 10;
  return (
    <svg viewBox={"0 0 " + W + " " + H} className="w-full" style={{ height: 220, display: "block" }} role="img" aria-label="Grafica de progreso">
      {ticks.map((t, i) => (
        <g key={i}>
          <line x1={P.l} x2={W - P.r} y1={y(t)} y2={y(t)} stroke={C.line} strokeDasharray="3 3" />
          <text x={P.l - 6} y={y(t) + 4} textAnchor="end" fontSize="10" fill={C.dim}>{r1(t)}</text>
        </g>
      ))}
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {data.map((d, i) => (
        <circle key={i} cx={x(i)} cy={y(d.v)} r="3.5" fill={color}>
          <title>{d.label + ": " + d.v + (unit ? " " + unit : "")}</title>
        </circle>
      ))}
      <text x={P.l} y={H - 8} fontSize="10" fill={C.dim}>{data[0].label}</text>
      <text x={W - P.r} y={H - 8} fontSize="10" fill={C.dim} textAnchor="end">{data[data.length - 1].label}</text>
    </svg>
  );
}

      )}

      {/* Nueva medida */}
      <Card>
        <h3 className="mb-3" style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 20, textTransform: "uppercase" }}>Nueva medida</h3>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Fecha">
            <input style={inputStyle} type="date" value={date} onChange={(e) => setDate(e.target.value)} />
          </Field>
          <Field label="Peso (kg)">
            <input style={inputStyle} type="number" inputMode="decimal" value={weight} onChange={(e) => setWeight(e.target.value)} placeholder="78.5" />
          </Field>
          <Field label="% Grasa (opcional)">
            <input style={inputStyle} type="number" inputMode="decimal" value={fat} onChange={(e) => setFat(e.target.value)} placeholder="18" />
          </Field>
          <Field label="% Músculo (opcional)">
            <input style={inputStyle} type="number" inputMode="decimal" value={muscle} onChange={(e) => setMuscle(e.target.value)} placeholder="42" />
          </Field>
        </div>
        {previewBmi != null && (
          <p className="text-sm mt-2" style={{ color: C.dim }}>IMC calculado: <b style={{ color: C.text }}>{previewBmi}</b> ({bmiLabel(previewBmi)})</p>
        )}
        {err && <p className="text-sm mt-2" style={{ color: C.red }}>{err}</p>}
        <div className="mt-3">
          <Btn full color={C.gold} onClick={() => {
            const w = parseFloat(weight);
            if (!date) { setErr("Falta la fecha."); return; }
            if (!w || Number.isNaN(w)) { setErr("Escribe un peso válido."); return; }
            setErr("");
            addMetric({ date, weight: w, fat: fat === "" ? null : parseFloat(fat), muscle: muscle === "" ? null : parseFloat(muscle) });
            setWeight(""); setFat(""); setMuscle("");
          }}>Guardar medida</Btn>
        </div>
      </Card>

      {/* Gráfica */}
      <Card>
        <div className="flex gap-2 mb-3 flex-wrap">
          {Object.keys(METRIC_DEFS).map((k) => (
            <button key={k} onClick={() => setMetric(k)} className="rounded-full px-3 py-1 text-sm font-semibold" style={{
              background: metric === k ? METRIC_DEFS[k].color : "transparent",
              color: metric === k ? C.ink : C.dim,
              border: "1px solid " + (metric === k ? METRIC_DEFS[k].color : C.line),
              cursor: "pointer",
            }}>{METRIC_DEFS[k].label}</button>
          ))}
        </div>
        {chartData.length >= 2 ? (
          <MiniChart data={chartData} color={def.color} unit={def.unit} />
        ) : (
          <p className="text-sm" style={{ color: C.dim }}>Registra al menos 2 medidas de {def.label.toLowerCase()} para ver la tendencia.</p>
        )}
      </Card>

      {/* Historial */}
      <Card>
        <h3 className="mb-2" style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 20, textTransform: "uppercase" }}>Historial</h3>
        {metricsAsc.length === 0 && <p className="text-sm" style={{ color: C.dim }}>Aún no hay medidas registradas.</p>}
        <div className="flex flex-col">
          {[...metricsAsc].reverse().map((m) => (
            <div key={m.id} className="flex items-center justify-between py-2" style={{ borderBottom: "1px solid " + C.line }}>
              <div>
                <p className="font-semibold text-sm">{fmtDate(m.date)} · {m.weight} kg{height ? " · IMC " + bmiOf(m.weight, height) : ""}</p>
                <p className="text-xs" style={{ color: C.dim }}>
                  {m.fat != null ? "Grasa " + m.fat + "%" : ""}{m.fat != null && m.muscle != null ? " · " : ""}{m.muscle != null ? "Músculo " + m.muscle + "%" : ""}
                  {m.fat == null && m.muscle == null ? "Solo peso" : ""}
                </p>
              </div>
              <button onClick={() => deleteMetric(m.id)} aria-label="Eliminar medida" style={{ background: "none", border: "none", color: C.dim, cursor: "pointer", fontSize: 18 }}>×</button>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ---------- Pestaña Generar (IA) ----------
function GeneratorTab({ applyDays }) {
  const [goal, setGoal] = useState("");
  const [nDays, setNDays] = useState(3);
  const [sel, setSel] = useState(() => new Set(EQUIPMENT.map((e) => e.key)));
  const [apiKey, setApiKey] = useState("");
  const [showKeyCfg, setShowKeyCfg] = useState(false);
  const [loading, setLoading] = useState(false);
  const [errMsg, setErrMsg] = useState("");
  const [preview, setPreview] = useState(null);

  useEffect(() => {
    (async () => {
      const k = await store.get("gymapp:apikey");
      if (k) setApiKey(k);
    })();
  }, []);

  function toggleEquip(k) {
    setSel((prev) => {
      const n = new Set(prev);
      if (n.has(k)) n.delete(k); else n.add(k);
      return n;
    });
  }

  const available = LIBRARY.filter((e) => e.equip.every((k) => sel.has(k)));

  async function generate() {
    setErrMsg("");
    if (!goal.trim()) { setErrMsg("Cuéntame primero qué buscas: objetivo, deporte, tiempo disponible…"); return; }
    if (!apiKey.trim()) { setErrMsg("Configura tu clave de API de Anthropic en la sección de abajo para usar la IA."); setShowKeyCfg(true); return; }
    if (available.length < 8) { setErrMsg("Con el equipo seleccionado hay muy pocos ejercicios disponibles. Marca más opciones."); return; }
    setLoading(true);
    setPreview(null);
    await store.set("gymapp:apikey", apiKey.trim());
    const lib = available.map((e) => ({ nombre: e.name, musculo: e.muscle, equipo: e.equip }));
    const prompt = [
      "Eres un entrenador experto en fuerza e hipertrofia. Diseña una rutina de gimnasio personalizada.",
      "OBJETIVO Y CONTEXTO DEL USUARIO: " + goal.trim(),
      "DÍAS DE ENTRENAMIENTO POR SEMANA: " + nDays,
      "BIBLIOTECA DE EJERCICIOS PERMITIDOS (usa SOLO estos, copiando el nombre EXACTO):",
      JSON.stringify(lib),
      "REGLAS:",
      "- Exactamente " + nDays + " días, con 5 a 7 ejercicios cada uno.",
      "- Compuestos pesados primero; aislamiento y core al final.",
      "- No repitas el mismo ejercicio dentro del mismo día.",
      "- 'sets' es un número; 'reps' es texto corto (ej: '6-8', '12 c/lado', 'Al fallo').",
      "- Cada ejercicio lleva un 'tip' técnico breve y útil en español.",
      "- El 'name' de cada día debe ser corto y descriptivo (ej: 'Día A · Empuje').",
      "Responde ÚNICAMENTE con JSON válido, sin markdown ni texto extra, con esta estructura exacta:",
      '{"days":[{"name":"Día A","exercises":[{"name":"Sentadilla con barra","sets":4,"reps":"6-8","tip":"..."}]}]}',
    ].join("\n");
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "content-type": "application/json",
          "x-api-key": apiKey.trim(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 3500, messages: [{ role: "user", content: prompt }] }),
      });
      if (!r.ok) {
        let detail = "";
        try { const j = await r.json(); detail = j.error && j.error.message ? j.error.message : ""; } catch (e2) {}
        throw new Error("error " + r.status + (detail ? ": " + detail : ""));
      }
      const dataR = await r.json();
      const text = (dataR.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      if (!parsed.days || !Array.isArray(parsed.days) || parsed.days.length === 0) throw new Error("la respuesta no trajo días válidos");
      setPreview(parsed.days);
    } catch (e) {
      const msg = e && e.message ? e.message : "";
      setErrMsg("No se pudo generar la rutina (" + (msg.includes("fetch") ? "revisa tu conexión y que la clave sea válida" : msg) + ").");
    }
    setLoading(false);
  }

  function apply() {
    const colors = [C.blue, C.purple, C.brown, C.green, C.gold, C.red];
    const ids = ["A", "B", "C", "D", "E", "F"];
    const byName = {};
    LIBRARY.forEach((e) => { byName[e.name.toLowerCase()] = e; });
    const built = preview.map((d, i) => ({
      id: ids[i] || String(i + 1),
      name: d.name || "Día " + (ids[i] || i + 1),
      color: colors[i % colors.length],
      exercises: (d.exercises || []).map((x) => {
        const found = byName[String(x.name || "").toLowerCase().trim()];
        return {
          id: uid(),
          name: x.name || "Ejercicio",
          sets: Number(x.sets) || 3,
          reps: String(x.reps || "10"),
          video: found ? found.video : "",
          muscle: found ? found.muscle : "",
          tip: x.tip || "",
        };
      }),
    }));
    applyDays(built);
    setPreview(null);
  }

  return (
    <div className="flex flex-col gap-4">
      <Card>
        <h3 style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 20, textTransform: "uppercase" }}>Generar rutina con IA</h3>
        <p className="text-sm mt-1" style={{ color: C.dim }}>Describe tu objetivo, marca el equipo que tienes y la IA arma un plan usando la biblioteca de {LIBRARY.length} ejercicios con video de técnica verificado.</p>
      </Card>

      <Card>
        <Field label="¿Qué buscas? (objetivo, deporte, tiempo, lesiones…)">
          <textarea
            style={{ ...inputStyle, minHeight: 110, resize: "vertical" }}
            value={goal}
            onChange={(e) => setGoal(e.target.value)}
            placeholder="Ej: practico BJJ 3 veces por semana, quiero ganar masa muscular y fuerza de agarre. Tengo 50 minutos por sesión y entreno antes de rodar."
          />
        </Field>
        <div className="mt-3">
          <Field label="Días de pesas por semana">
            <div className="flex gap-2">
              {[2, 3, 4, 5].map((n) => (
                <button key={n} onClick={() => setNDays(n)} className="rounded-lg px-4 py-2 font-semibold" style={{
                  background: nDays === n ? C.gold : "transparent",
                  color: nDays === n ? C.ink : C.dim,
                  border: "1px solid " + (nDays === n ? C.gold : C.line),
                  cursor: "pointer",
                }}>{n}</button>
              ))}
            </div>
          </Field>
        </div>
        <div className="mt-3">
          <Field label={"Equipo disponible · " + available.length + " ejercicios posibles"}>
            <div className="flex flex-wrap gap-2">
              {EQUIPMENT.map((e) => {
                const on = sel.has(e.key);
                return (
                  <button key={e.key} onClick={() => toggleEquip(e.key)} className="rounded-full px-3 py-1 text-sm font-semibold" style={{
                    background: on ? C.surface2 : "transparent",
                    color: on ? C.text : C.dim,
                    border: "1px solid " + (on ? C.gold : C.line),
                    cursor: "pointer",
                  }}>{on ? "✓ " : ""}{e.label}</button>
                );
              })}
            </div>
          </Field>
        </div>
        {errMsg && <p className="text-sm mt-3" style={{ color: C.red }}>{errMsg}</p>}
        <div className="mt-4">
          <Btn full color={C.gold} onClick={loading ? () => {} : generate} style={{ opacity: loading ? 0.6 : 1 }}>
            {loading ? "Generando… (10-20 s)" : "✦ Generar rutina con IA"}
          </Btn>
        </div>
      </Card>

      {preview && (
        <Card style={{ border: "1px solid " + C.green }}>
          <h3 style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 20, textTransform: "uppercase", color: C.green }}>Propuesta generada</h3>
          {preview.map((d, i) => (
            <div key={i} className="mt-3">
              <p className="font-semibold">{d.name || "Día " + (i + 1)}</p>
              <div className="mt-1 flex flex-col gap-1">
                {(d.exercises || []).map((x, j) => (
                  <p key={j} className="text-sm" style={{ color: C.dim }}>• {x.name} — {x.sets}×{x.reps}</p>
                ))}
              </div>
            </div>
          ))}
          <div className="mt-4 flex gap-2">
            <Btn color={C.green} onClick={apply}>Aplicar como mi rutina</Btn>
            <Btn ghost onClick={() => setPreview(null)}>Descartar</Btn>
          </div>
          <p className="text-xs mt-2" style={{ color: C.dim }}>Al aplicar se reemplaza tu rutina actual. El calentamiento, tus medidas e historial se conservan.</p>
        </Card>
      )}

      <Card style={{ background: C.surface2 }}>
        <button onClick={() => setShowKeyCfg(!showKeyCfg)} className="w-full flex items-center justify-between" style={{ background: "none", border: "none", cursor: "pointer", color: C.text }}>
          <span style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 18, textTransform: "uppercase" }}>Configurar IA</span>
          <span className="text-sm" style={{ color: apiKey ? C.green : C.gold }}>{apiKey ? "Clave guardada ✓ " : "Requiere clave · "}{showKeyCfg ? "−" : "+"}</span>
        </button>
        {showKeyCfg && (
          <div className="mt-3 flex flex-col gap-3">
            <Field label="Clave de API de Anthropic">
              <input style={inputStyle} type="password" value={apiKey} onChange={(e) => setApiKey(e.target.value)} placeholder="sk-ant-…" />
            </Field>
            <p className="text-xs" style={{ color: C.dim }}>
              La clave se guarda solo en este navegador y se usa para llamar directamente a la API de Anthropic (cada rutina cuesta centavos). Consigue la tuya en <a href="https://console.anthropic.com" target="_blank" rel="noreferrer" style={{ color: C.gold }}>console.anthropic.com</a>. No la ingreses en dispositivos ajenos.
            </p>
            <div>
              <Btn small color={C.gold} onClick={async () => { await store.set("gymapp:apikey", apiKey.trim()); setErrMsg(""); setShowKeyCfg(false); }}>Guardar clave</Btn>
            </div>
          </div>
        )}
      </Card>
    </div>
  );
}

// ---------- Perfil con cuenta en la nube ----------
function CloudProfileTab({ user, data, users, updateUser, importLocal, onSignOut, cloudErr }) {
  const [editH, setEditH] = useState("");
  const [confirmImport, setConfirmImport] = useState(null);
  const [confirmOut, setConfirmOut] = useState(false);
  return (
    <div className="flex flex-col gap-4">
      <Card style={{ border: "1px solid " + (cloudErr ? C.red : C.green) }}>
        <div className="flex items-center gap-3">
          {user.avatar ? (
            <img src={user.avatar} alt="" referrerPolicy="no-referrer" className="rounded-full" style={{ width: 48, height: 48 }} />
          ) : (
            <div className="rounded-full flex items-center justify-center" style={{ width: 48, height: 48, background: C.surface2, border: "1px solid " + C.line, fontFamily: FONT_DISPLAY, fontWeight: 800, fontSize: 20 }}>{(user.name || "?").slice(0, 1).toUpperCase()}</div>
          )}
          <div className="flex-1">
            <h3 style={{ fontFamily: FONT_DISPLAY, fontWeight: 800, fontSize: 22, textTransform: "uppercase", lineHeight: 1.1 }}>{user.name}</h3>
            <p className="text-xs" style={{ color: C.dim }}>{user.email}</p>
          </div>
        </div>
        <p className="text-sm mt-3" style={{ color: cloudErr ? C.red : C.green }}>
          {cloudErr ? "Sin conexión con la nube en este momento" : "✓ Sincronizado en la nube: tu progreso te sigue en cualquier dispositivo"}
        </p>
        <p className="text-xs mt-1" style={{ color: C.dim }}>{data ? data.metrics.length : 0} medidas registradas</p>
        <div className="mt-3 flex items-end gap-2">
          <Field label={"Estatura (cm)" + (user.height ? " · actual: " + user.height : "")}>
            <input style={inputStyle} type="number" inputMode="decimal" value={editH} onChange={(e) => setEditH(e.target.value)} placeholder={user.height ? String(user.height) : "175"} />
          </Field>
          <Btn color={C.gold} onClick={() => { if (editH) { updateUser({ height: Number(editH) }); setEditH(""); } }}>Guardar</Btn>
        </div>
      </Card>

      {users && users.length > 0 && (
        <Card>
          <h3 className="mb-1" style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 20, textTransform: "uppercase" }}>Importar datos locales</h3>
          <p className="text-xs mb-3" style={{ color: C.dim }}>Sube a tu cuenta los datos de un perfil local de este dispositivo. Esto reemplaza la rutina y medidas que tengas en la nube.</p>
          <div className="flex flex-col gap-2">
            {users.map((u) => (
              <div key={u.id} className="flex items-center justify-between rounded-lg px-3 py-2" style={{ background: C.surface2, border: "1px solid " + C.line }}>
                <span className="font-semibold text-sm">{u.name}</span>
                {confirmImport === u.id ? (
                  <Btn small color={C.red} onClick={() => { importLocal(u.id); setConfirmImport(null); }}>¿Seguro? Sí, subir</Btn>
                ) : (
                  <Btn small ghost color={C.gold} onClick={() => setConfirmImport(u.id)}>Subir a la nube</Btn>
                )}
              </div>
            ))}
          </div>
        </Card>
      )}

      <Card style={{ background: C.surface2 }}>
        {confirmOut ? (
          <div className="flex gap-2">
            <Btn color={C.red} onClick={onSignOut}>Sí, cerrar sesión</Btn>
            <Btn ghost onClick={() => setConfirmOut(false)}>Cancelar</Btn>
          </div>
        ) : (
          <Btn full ghost color={C.red} onClick={() => setConfirmOut(true)}>Cerrar sesión</Btn>
        )}
        <p className="text-xs mt-2" style={{ color: C.dim }}>Al cerrar sesión vuelves al modo local de este dispositivo. Tus datos en la nube quedan guardados.</p>
      </Card>
    </div>
  );
}

// ---------- Pestaña Perfil ----------
function ProfileTab({ users, activeUser, data, loadUser, createUser, updateUser, deleteUser, sbReady, onSignIn }) {
  const [name, setName] = useState("");
  const [height, setHeight] = useState("");
  const [editH, setEditH] = useState("");
  const [confirmDel, setConfirmDel] = useState(null);
  const [showNew, setShowNew] = useState(false);

  return (
    <div className="flex flex-col gap-4">
      {sbReady && (
        <Card style={{ border: "1px solid " + C.gold }}>
          <p className="text-sm mb-3" style={{ color: C.dim }}>Inicia sesión para sincronizar tu rutina, medidas y progreso entre todos tus dispositivos.</p>
          <Btn full onClick={onSignIn}>Continuar con Google</Btn>
        </Card>
      )}
      {activeUser && (
        <Card>
          <p className="text-xs uppercase tracking-wider mb-1" style={{ color: C.gold }}>Perfil activo</p>
          <h3 style={{ fontFamily: FONT_DISPLAY, fontWeight: 800, fontSize: 28, textTransform: "uppercase" }}>{activeUser.name}</h3>
          <p className="text-sm mt-1" style={{ color: C.dim }}>
            Desde {fmtDate(activeUser.createdAt)} · {data ? data.metrics.length : 0} medidas registradas
          </p>
          <div className="mt-3 flex items-end gap-2">
            <Field label={"Estatura (cm)" + (activeUser.height ? " · actual: " + activeUser.height : "")}>
              <input style={inputStyle} type="number" inputMode="decimal" value={editH} onChange={(e) => setEditH(e.target.value)} placeholder={activeUser.height ? String(activeUser.height) : "175"} />
            </Field>
            <Btn color={C.gold} onClick={() => { if (editH) { updateUser({ height: Number(editH) }); setEditH(""); } }}>Guardar</Btn>
          </div>
        </Card>
      )}

      <Card>
        <h3 className="mb-2" style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 20, textTransform: "uppercase" }}>Usuarios</h3>
        <div className="flex flex-col gap-2">
          {users.map((u) => (
            <div key={u.id} className="flex items-center justify-between rounded-lg px-3 py-2" style={{ background: C.surface2, border: "1px solid " + (u.id === activeUser?.id ? C.gold : C.line) }}>
              <span className="font-semibold">{u.name}</span>
              <div className="flex gap-2 items-center">
                {u.id !== activeUser?.id && <Btn small ghost onClick={() => loadUser(u.id)}>Usar</Btn>}
                {confirmDel === u.id ? (
                  <Btn small color={C.red} onClick={() => { deleteUser(u.id); setConfirmDel(null); }}>¿Seguro?</Btn>
                ) : (
                  <button onClick={() => setConfirmDel(u.id)} aria-label="Eliminar usuario" style={{ background: "none", border: "none", color: C.dim, cursor: "pointer", fontSize: 18 }}>×</button>
                )}
              </div>
            </div>
          ))}
        </div>

        {!showNew ? (
          <div className="mt-3"><Btn full ghost color={C.gold} onClick={() => setShowNew(true)}>+ Crear otro usuario</Btn></div>
        ) : (
          <div className="mt-3 flex flex-col gap-3">
            <Field label="Nombre">
              <input style={inputStyle} value={name} onChange={(e) => setName(e.target.value)} placeholder="Nombre del nuevo usuario" />
            </Field>
            <Field label="Estatura (cm, opcional)">
              <input style={inputStyle} type="number" inputMode="decimal" value={height} onChange={(e) => setHeight(e.target.value)} placeholder="170" />
            </Field>
            <div className="flex gap-2">
              <Btn color={C.gold} onClick={() => { if (name.trim()) { createUser(name, height, null); setName(""); setHeight(""); setShowNew(false); } }}>Crear</Btn>
              <Btn ghost onClick={() => setShowNew(false)}>Cancelar</Btn>
            </div>
          </div>
        )}
      </Card>

      <Card style={{ background: C.surface2 }}>
        <p className="text-sm" style={{ color: C.dim }}>
          Cada usuario tiene su propia rutina, medidas e historial, guardados en el navegador de este dispositivo (localStorage). Los videos son de YouTube: puedes reemplazar cualquiera desde <b style={{ color: C.text }}>Rutina → Editar rutina</b> pegando otro link.
        </p>
      </Card>
    </div>
  );
}
